spring.application.name=parking-cloud-service
server.port=8080
server.servlet.context-path=/cloud

# ============================================
# PostgreSQL Database - Supabase
# ============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA Configuration
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=com.parkingit.cloud.shared.domain.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# ============================================
# Supabase Configuration
# ============================================
supabase.url=${SUPABASE_URL}
supabase.publishable-key=${SUPABASE_PUBLISHABLE_KEY}
supabase.direct-connection-string=${SUPABASE_DIRECT_URL}

# ============================================
# Supabase S3 Configuration
# ============================================
supabase.s3.endpoint=${SUPABASE_S3_ENDPOINT}
supabase.s3.region=us-east-2
supabase.s3.access-key=${SUPABASE_S3_ACCESS_KEY}
supabase.s3.secret-key=${SUPABASE_S3_SECRET_KEY}
supabase.s3.bucket=companions

# ============================================
# JWT Configuration
# ============================================
authorization.jwt.secret=${JWT_SECRET}
authorization.jwt.expiration.days=7

# ============================================
# Email Configuration
# ============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================
# Payment Configuration
# ============================================
payment.yape.merchant-phone=+51987654321
payment.yape.merchant-name=ParkingIT
payment.plin.merchant-id=123456789
payment.plin.merchant-name=ParkingIT
payment.culqi.api-key=${CULQI_API_KEY:sk_test_1234567890abcdef}
payment.culqi.public-key=${CULQI_PUBLIC_KEY:pk_test_1234567890abcdef}
payment.culqi.api-url=https://api.culqi.com/v2

# ============================================
# Logging
# ============================================
logging.level.root=INFO
logging.level.com.parkingit=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN